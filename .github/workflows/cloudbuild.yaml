steps:
- name: 'curlimages/curl'
  entrypoint: 'sh'
  args:
    - scripts/github/trigger-workflow.sh
    secretEnv:
    - GITHUB_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/fundflow-prod/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY