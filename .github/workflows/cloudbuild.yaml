steps:
# 1. Obtener private key
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - -c
    - |
      gcloud secrets versions access latest \
        --secret=github-app-private-key > /workspace/private-key.pem

# 2. Ejecutar trigger
- name: 'curlimages/curl'
  entrypoint: 'sh'
  args:
    - -c
    - |
      apk add --no-cache openssl jq
      sh scripts/github/trigger-with-app.sh

options:
  logging: CLOUD_LOGGING_ONLY