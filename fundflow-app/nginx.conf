server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to BFF — same pattern as Vite proxy in dev
    # React calls /api/v1/funds → nginx forwards to fundflow-bff:8080
    location /api {
        proxy_pass http://fundflow-bff:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Handle React Router — any unknown path serves index.html
    # Without this, refreshing /dashboard returns 404 from nginx
    location / {
        try_files $uri $uri/ /index.html;
    }
}