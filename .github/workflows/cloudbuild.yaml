steps:
  - name: 'curlimages/curl'
    id: 'trigger-github-ci'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -e

        echo "Trigger CI for branch ci-cloudbuild-test"

        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://api.github.com/repos/ziuld/fundflow/actions/workflows/ci.yml/dispatches" \
          -d '{"ref":"ci-cloudbuild-test"}')

        echo "GitHub response: $RESPONSE"

        if [ "$RESPONSE" -ne 204 ]; then
          echo "Error triggering GitHub Actions"
          exit 1
        fi
    secretEnv:
      - GITHUB_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/fundflow-prod/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY