name: FundFlow CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GCP_REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:

  bff-build:
    name: BFF — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        working-directory: ./fundflow-bff
        run: mvn clean package -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-bff-jar
          path: fundflow-bff/target/*.jar
          retention-days: 7

  app-build:
    name: React App — Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fundflow-app/package-lock.json

      - name: Install dependencies
        working-directory: ./fundflow-app
        run: npm ci

      - name: Build production bundle
        working-directory: ./fundflow-app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-app-dist
          path: fundflow-app/dist/
          retention-days: 7

  core-validate:
    name: Python Seeder — Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./fundflow-core
        run: pip install -r requirements.txt

      - name: Validate CSV exists and is readable
        run: |
          python -c "import csv; rows = list(csv.DictReader(open('fundflow-core/data/funds.csv'))); assert len(rows) > 0; assert 'isin' in rows[0]; print(f'funds.csv OK: {len(rows)} funds')"
          python -c "import csv; rows = list(csv.DictReader(open('fundflow-core/data/funds_supplemental.csv'))); assert len(rows) > 0; assert 'isin' in rows[0]; print(f'funds_supplemental.csv OK: {len(rows)} funds')"

  docker-validate:
    name: Docker Compose — Validate config
    runs-on: ubuntu-latest
    needs: [bff-build, app-build, core-validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [docker-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build BFF Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:latest ./fundflow-bff

      - name: Push BFF image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:latest

      - name: Build React app Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:latest ./fundflow-app

      - name: Push React app image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:latest

      - name: Deploy BFF to Cloud Run
        run: |
          gcloud run deploy fundflow-bff \
            --image=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="SPRING_APPLICATION_JSON={\"spring\":{\"data\":{\"mongodb\":{\"uri\":\"${{ secrets.MONGODB_URI }}\"}}}},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080

      - name: Get BFF Cloud Run URL
        id: bff-url
        run: |
          BFF_URL=$(gcloud run services describe fundflow-bff --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "url=$BFF_URL" >> $GITHUB_OUTPUT

      - name: Deploy React app to Cloud Run
        run: |
          gcloud run deploy fundflow-app \
            --image=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080

      - name: Print deployment URLs
        run: |
          echo "BFF URL: ${{ steps.bff-url.outputs.url }}"
          APP_URL=$(gcloud run services describe fundflow-app --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "App URL: $APP_URL"