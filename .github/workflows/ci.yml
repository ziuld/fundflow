name: FundFlow CI

# Triggers: run on every push to main and on every pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Build and test the Spring Boot BFF
  # ─────────────────────────────────────────────
  bff-build:
    name: BFF — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven        # caches ~/.m2 between runs — faster builds

      - name: Build and test with Maven
        working-directory: ./fundflow-bff
        run: mvn clean package -B
        # -B = batch mode (no interactive prompts, cleaner CI logs)
        # clean package = compile + test + package into JAR
        # We don't use -DskipTests here because in CI we WANT tests to run

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-bff-jar
          path: fundflow-bff/target/*.jar
          retention-days: 7   # keep artifact for 7 days

  # ─────────────────────────────────────────────
  # JOB 2 — Build and test the React app
  # ─────────────────────────────────────────────
  app-build:
    name: React App — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fundflow-app/package-lock.json

      - name: Install dependencies
        working-directory: ./fundflow-app
        run: npm ci
        # npm ci is faster than npm install in CI — uses package-lock.json exactly

      - name: Build production bundle
        working-directory: ./fundflow-app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-app-dist
          path: fundflow-app/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 3 — Validate Python seeder
  # ─────────────────────────────────────────────
  core-validate:
    name: Python Seeder — Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./fundflow-core
        run: pip install -r requirements.txt

      - name: Validate CSV exists and is readable
        run: |
          python -c "import csv; rows = list(csv.DictReader(open('fundflow-core/data/funds.csv'))); assert len(rows) > 0; assert 'isin' in rows[0]; print(f'funds.csv OK: {len(rows)} funds')"
          python -c "import csv; rows = list(csv.DictReader(open('fundflow-core/data/funds_supplemental.csv'))); assert len(rows) > 0; assert 'isin' in rows[0]; print(f'funds_supplemental.csv OK: {len(rows)} funds')"
  # ─────────────────────────────────────────────
  # JOB 4 — Docker Compose validation
  # Runs after all three builds pass
  # ─────────────────────────────────────────────
  docker-validate:
    name: Docker Compose — Validate config
    runs-on: ubuntu-latest
    needs: [bff-build, app-build, core-validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config
        # Parses and validates the compose file without starting containers
        # Catches syntax errors and missing references early