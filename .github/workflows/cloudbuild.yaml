steps:
  - name: 'curlimages/curl'
    entrypoint: 'bash'
    args:
      - -c
      - |
        curl -X POST \
          -H "Authorization: Bearer $$GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/ziuld/fundflow/actions/workflows/ci.yml/dispatches \
          -d '{"ref":"ci-cloudbuild-test"}'
    secretEnv:
      - GITHUB_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/fundflow-prod/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY