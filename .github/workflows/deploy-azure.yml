name: Deploy — Azure Container Apps

on:
  push:
    branches: [ main ]

env:
  AZURE_RESOURCE_GROUP: fundflow-rg
  ACR_NAME: fundflowacr

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC login to Azure (no passwords)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Login to ACR
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # -----------------------
      # Build + Push BFF
      # -----------------------
      - name: Build & Push BFF
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/fundflow-bff:${{ github.sha }} \
            ./fundflow-bff

          docker push ${{ env.ACR_NAME }}.azurecr.io/fundflow-bff:${{ github.sha }}

      # Deploy BFF
      - name: Deploy BFF
        run: |
          az containerapp update \
            --name fundflow-bff \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/fundflow-bff:${{ github.sha }}

      # -----------------------
      # Get BFF URL (internal)
      # -----------------------
      - name: Resolve BFF URL
        id: bff
        run: |
          DOMAIN=$(az containerapp env show \
            --name fundflow-env \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.defaultDomain -o tsv)

          echo "url=https://fundflow-bff.$DOMAIN" >> $GITHUB_OUTPUT

      # -----------------------
      # Build + Push Frontend
      # -----------------------
      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ steps.bff.outputs.url }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/fundflow-app:${{ github.sha }} \
            ./fundflow-app

          docker push ${{ env.ACR_NAME }}.azurecr.io/fundflow-app:${{ github.sha }}

      # Deploy frontend
      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name fundflow-app \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/fundflow-app:${{ github.sha }}