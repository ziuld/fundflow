# ─────────────────────────────────────────────────────────────────────────────
# FundFlow — Continuous Integration
#
# Runs on every push to main and develop, and on every PR targeting main.
# Validates all three services in parallel — Java BFF, React app, Python seeder.
# All jobs must pass before any deployment workflow can trigger.
#
# Deployment is handled by separate workflow files:
#   - deploy-gcp.yml  → Google Cloud Run  (disabled)
#   - deploy-aws.yml  → AWS ECS Fargate   (active)
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  workflow_dispatch:

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — BFF: compile and test
  #
  # Uses Maven to compile the Spring Boot project and run all unit tests.
  # The JAR artifact is uploaded so deploy jobs can reuse it without rebuilding.
  # ───────────────────────────────────────────────────────────────────────────
  bff-ci:
    name: BFF — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: ./fundflow-bff
        run: mvn clean package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-bff-jar
          path: fundflow-bff/target/*.jar
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — React app: install, build
  #
  # Uses npm ci (faster than npm install, uses package-lock.json exactly)
  # and builds the Vite production bundle.
  # ───────────────────────────────────────────────────────────────────────────
  app-ci:
    name: React App — Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fundflow-app/package-lock.json

      - name: Install dependencies
        working-directory: ./fundflow-app
        run: npm ci

      - name: Build production bundle
        working-directory: ./fundflow-app
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: fundflow-app-dist
          path: fundflow-app/dist/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Python seeder: validate
  #
  # Installs pymongo and validates that both CSV files exist,
  # are readable, and contain the required columns.
  # ───────────────────────────────────────────────────────────────────────────
  core-ci:
    name: Python Seeder — Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./fundflow-core
        run: pip install -r requirements.txt

      - name: Validate fund CSVs
        run: |
          python -c "
          import csv
          files = ['fundflow-core/data/funds.csv', 'fundflow-core/data/funds_supplemental.csv']
          for f in files:
              rows = list(csv.DictReader(open(f)))
              assert len(rows) > 0, f'{f} is empty'
              assert 'isin' in rows[0], f'{f} missing isin column'
              print(f'{f}: OK ({len(rows)} funds)')
          "

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Docker Compose: validate config
  #
  # Parses docker-compose.yml and validates syntax without starting containers.
  # Acts as the final gate — only runs after all three service jobs pass.
  # ───────────────────────────────────────────────────────────────────────────
  compose-ci:
    name: Docker Compose — Validate config
    runs-on: ubuntu-latest
    needs: [ bff-ci, app-ci, core-ci ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          docker compose version
          docker compose config