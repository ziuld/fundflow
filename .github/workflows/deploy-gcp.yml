# ─────────────────────────────────────────────────────────────────────────────
# FundFlow — Deploy to Google Cloud Run
#
# STATUS: DISABLED (if: false)
# Preserved for reference. To re-enable, remove the "if: false" condition.
#
# What this does:
#   1. Builds BFF and React Docker images
#   2. Pushes to Google Artifact Registry (europe-west1)
#   3. Deploys BFF to Cloud Run
#   4. Gets BFF URL and injects it into React build at compile time
#   5. Deploys React app to Cloud Run
#
# Required GitHub secrets:
#   - GCP_SA_KEY       → Service account JSON key
#   - GCP_PROJECT_ID   → fundflow-prod
#   - MONGODB_URI      → MongoDB Atlas connection string
#   - GEMINI_API_KEY   → Gemini API key
#
# Live URLs (when enabled):
#   BFF: https://fundflow-bff-118201552061.europe-west1.run.app
#   App: https://fundflow-app-118201552061.europe-west1.run.app
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy — GCP Cloud Run

on:
  push:
    branches: [ main ]

env:
  GCP_REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    if: false  # DISABLED — remove this line to re-enable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── BFF ───────────────────────────────────────────────────────────────
      - name: Build BFF image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:latest \
            ./fundflow-bff

      - name: Push BFF image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:latest

      - name: Deploy BFF to Cloud Run
        run: |
          gcloud run deploy fundflow-bff \
            --image=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-bff:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars="SPRING_DATA_MONGODB_URI=${{ secrets.MONGODB_URI }}" \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080

      # ── React app ─────────────────────────────────────────────────────────
      # IMPORTANT: BFF must be deployed first so we can get its URL.
      # The URL is baked into the React bundle at compile time via Vite.
      - name: Get BFF Cloud Run URL
        id: bff-url
        run: |
          BFF_URL=$(gcloud run services describe fundflow-bff \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "url=$BFF_URL" >> $GITHUB_OUTPUT
          echo "BFF deployed at: $BFF_URL"

      - name: Build React image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ steps.bff-url.outputs.url }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:latest \
            ./fundflow-app

      - name: Push React image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:latest

      - name: Deploy React app to Cloud Run
        run: |
          gcloud run deploy fundflow-app \
            --image=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/fundflow/fundflow-app:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --port=8080

      - name: Print deployment URLs
        run: |
          APP_URL=$(gcloud run services describe fundflow-app \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "================================"
          echo "BFF : ${{ steps.bff-url.outputs.url }}"
          echo "App : $APP_URL"
          echo "================================"