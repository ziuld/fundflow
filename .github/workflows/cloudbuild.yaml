steps:
- name: 'curlimages/curl'
  entrypoint: 'sh'
  args:
    - -c
    - |
      set -x

      curl -v --fail-with-body \
        -X POST \
        -H "Authorization: Bearer $$GITHUB_TOKEN" \
        -H "Accept: application/vnd.github+json" \
        -H "Content-Type: application/json" \
        https://api.github.com/repos/ziuld/fundflow/actions/workflows/254786445/dispatches \
        --data-raw '{"ref":"ci-cloudbuild-test"}'
  secretEnv:
    - GITHUB_TOKEN

availableSecrets:
  secretManager:
    - versionName: projects/fundflow-prod/secrets/github-token/versions/latest
      env: GITHUB_TOKEN

options:
  logging: CLOUD_LOGGING_ONLY